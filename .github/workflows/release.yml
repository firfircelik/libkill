name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            artifact: libkill-linux-amd64
            goos: linux
            goarch: amd64
            cc: ""
          - runner: ubuntu-latest
            artifact: libkill-linux-arm64
            goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
          - runner: macos-latest
            artifact: libkill-darwin-amd64
            goos: darwin
            goarch: amd64
            cc: ""
          - runner: macos-latest
            artifact: libkill-darwin-arm64
            goos: darwin
            goarch: arm64
            cc: ""
          - runner: windows-latest
            artifact: libkill-windows-amd64.exe
            goos: windows
            goarch: amd64
            cc: ""

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install cross-compiler (linux/arm64)
        if: matrix.cc != ''
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: go build -o ${{ matrix.artifact }} ./cmd/libkill
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: cd dist && sha256sum libkill-* > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
